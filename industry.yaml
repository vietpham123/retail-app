  - { name: viewer, description: "View dashboards and reports" }
  - { name: store_associate, description: "Process orders and inventory" }
  - { name: warehouse_worker, description: "Fulfill and ship orders" }
  - { name: store_manager, description: "Full store operations access" }
  - { name: admin, description: "System administration" }

# --- Regions / Stores ----------------------------------------
