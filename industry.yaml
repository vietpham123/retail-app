# ============================================================
# INDUSTRY CONFIGURATION — RETAIL
# ============================================================
# Retail Operations Platform
# Example stores: Gap, Old Navy, Macy's
# ============================================================

industry: retail
display_name: "Retail Operations Platform"

# --- Domain Entities ----------------------------------------
entities:
  - name: order
    description: "A customer purchase order"
    table: orders
    fields:
      - { name: id, type: uuid, primary: true }
      - { name: customer_id, type: string }
      - { name: store, type: string }
      - { name: status, type: enum, values: [placed, processing, shipped, delivered, returned] }
      - { name: total_amount, type: float }
      - { name: items_count, type: integer }
      - { name: placed_at, type: timestamptz }
      - { name: delivered_at, type: timestamptz, nullable: true }
    primary_service: order-service
    kafka_topic: retail.order

  - name: inventory_reading
    description: "A stock level reading for a product"
    table: inventory_readings
    fields:
      - { name: id, type: uuid, primary: true }
      - { name: sku, type: string }
      - { name: quantity, type: integer }
      - { name: warehouse, type: string }
      - { name: recorded_at, type: timestamptz }
    primary_service: inventory-service
    kafka_topic: retail.inventory

  - name: store_asset
    description: "A store fixture, POS terminal, or equipment"
    table: store_assets
    fields:
      - { name: id, type: uuid, primary: true }
      - { name: name, type: string }
      - { name: type, type: enum, values: [pos, display, refrigerator, shelf, kiosk] }
      - { name: store, type: string }
      - { name: status, type: enum, values: [active, maintenance, decommissioned] }
    primary_service: store-layout-service
    kafka_topic: retail.store_asset

  - name: fulfillment_task
    description: "A pick, pack, or ship task"
    table: fulfillment_tasks
    fields:
      - { name: id, type: uuid, primary: true }
      - { name: order_id, type: uuid }
      - { name: assignee, type: string }
      - { name: priority, type: enum, values: [standard, express, same_day] }
      - { name: status, type: enum, values: [pending, picking, packing, shipped, completed] }
      - { name: due_at, type: timestamptz }
    primary_service: fulfillment-service
    kafka_topic: retail.fulfillment

  - name: demand_forecast
    description: "Predicted sales demand for a product"
    table: demand_forecasts
    fields:
      - { name: id, type: uuid, primary: true }
      - { name: sku, type: string }
      - { name: predicted_units, type: float }
      - { name: confidence, type: float }
      - { name: period_start, type: timestamptz }
      - { name: period_end, type: timestamptz }
    primary_service: demand-forecast-service
    kafka_topic: retail.demand_forecast

# --- Services -----------------------------------------------
services:
  order-service:
    language: node
    port: 3001
    description: "Manages customer orders and returns"
    entities: [order]

  inventory-service:
    language: node
    port: 3002
    description: "Tracks real-time stock levels across warehouses"
    entities: [inventory_reading]

  pos-telemetry-service:
    language: dotnet
    port: 5001
    description: "Ingests POS terminal and IoT sensor data"
    entities: [inventory_reading]

  catalog-service:
    language: java
    port: 8081
    description: "Processes product catalog updates"
    entities: [inventory_reading, order]

  store-layout-service:
    language: python
    port: 5002
    description: "Models store layouts and asset placement"
    entities: [store_asset]

  sales-analytics-service:
    language: go
    port: 8082
    description: "Real-time sales and conversion metrics"
    entities: [order, inventory_reading]

  demand-forecast-service:
    language: ruby
    port: 4567
    description: "Predicts product demand by region and season"
    entities: [demand_forecast]

  fulfillment-dispatch-service:
    language: kotlin
    port: 8083
    description: "Assigns fulfillment tasks to warehouse staff"
    entities: [fulfillment_task]

  customer-notification-service:
    language: php
    port: 8080
    description: "Sends order status updates to customers"
    entities: []

  supplier-feed-service:
    language: elixir
    port: 4000
    description: "Integrates supplier inventory and pricing feeds"
    entities: []

  aggregator-service:
    language: rust
    port: 8084
    description: "Aggregates sales, inventory, and fulfillment data"
    entities: [order, inventory_reading, demand_forecast]

  auth-service:
    language: ruby
    port: 4568
    description: "User authentication and management"
    entities: []

  audit-service:
    language: go
    port: 8085
    description: "Audit trail and compliance logging"
    entities: []

  dynamic-pricing-service:
    language: python
    port: 5003
    description: "Manages promotions and dynamic pricing"
    entities: []

  fulfillment-service:
    language: java
    port: 8086
    description: "Manages pick/pack/ship fulfillment tasks"
    entities: [fulfillment_task]

  fraud-detection-service:
    language: dotnet
    port: 5004
    description: "Correlates transactions for fraud detection"
    entities: [order]

