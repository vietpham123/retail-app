# --- KPIs ---------------------------------------------------
kpis:
  - name: "Orders Today"
    source: "/api/analytics/dashboard"
    field: "orders_today"
    format: "number"
    color: "#2196f3"

  - name: "Revenue"
    source: "/api/analytics/dashboard"
    field: "daily_revenue"
    format: "currency"
    color: "#4caf50"

  - name: "Items In Stock"
    source: "/api/analytics/dashboard"
    field: "total_in_stock"
    format: "number"
    color: "#ff9800"

  - name: "Fulfillment Rate"
    source: "/api/analytics/dashboard"
    field: "fulfillment_rate_pct"
    format: "percent"
    color: "#9c27b0"

  - name: "Cart Abandonment"
    source: "/api/analytics/dashboard"
    field: "abandonment_pct"
    format: "percent"
    color: "#f44336"

  - name: "Avg Ship Time"
    source: "/api/analytics/dashboard"
    field: "avg_ship_hours"
    format: "number"
    color: "#00bcd4"

# --- Roles --------------------------------------------------
